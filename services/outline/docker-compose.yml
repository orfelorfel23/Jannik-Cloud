services:
  outline:
    image: outlinewiki/outline:latest
    container_name: outline
    restart: always
    networks:
      - jannik-cloud-net
    expose:
      - "11000"
    environment:
      URL: "https://outline.orfel.de"
      SECRET_KEY: "${SECRET_KEY}"
      UTILS_SECRET_KEY: "${UTILS_SECRET_KEY}"
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@outline-postgres:5432/outline"
      REDIS_URL: "redis://outline-redis:6379"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET}"
      OIDC_AUTH_URI: "https://auth.example.com/oauth/authorize"
      OIDC_TOKEN_URI: "https://auth.example.com/oauth/token"
      OIDC_USERINFO_URI: "https://auth.example.com/oauth/userinfo"
      OIDC_LOGOUT_URI: "https://auth.example.com/logout"
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/outline:/var/lib/outline
    depends_on:
      - outline-postgres
      - outline-redis
    labels:
      - "com.example.description=Outline Wiki Service"

  outline-postgres:
    image: postgres:15-alpine
    container_name: outline-postgres
    restart: always
    networks:
      - jannik-cloud-net
    environment:
      POSTGRES_DB: outline
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/outline/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  outline-redis:
    image: redis:7-alpine
    container_name: outline-redis
    restart: always
    networks:
      - jannik-cloud-net
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/outline/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  jannik-cloud-net:
    external: true
