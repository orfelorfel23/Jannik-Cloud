services:
  erkw:
    image: nginx:alpine
    container_name: erkw
    restart: unless-stopped
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/erkw/content:/usr/share/nginx/html:ro
      - /mnt/Jannik-Cloud-Volume-01/erkw/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
