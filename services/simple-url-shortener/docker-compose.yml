services:
  simple-url-shortener:
    build: https://github.com/azlux/Simple-URL-Shortener.git#master
    container_name: simple-url-shortener
    restart: unless-stopped
    # Depending on the image it exposes 80 inside the container
    ports:
      - "8086:80"
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/simple-url-shortener:/var/www/html/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
