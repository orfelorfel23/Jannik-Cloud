services:
  dub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dub
    restart: unless-stopped
    ports:
      - "127.0.0.1:382:3000"
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - db
      - redis
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    networks:
      - jannik-cloud-net

  db:
    image: mysql:8.0
    container_name: dub_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: dub
      MYSQL_USER: dub
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/dub/db:/var/lib/mysql
    networks:
      - jannik-cloud-net

  ps-proxy:
    image: ghcr.io/mattrobenolt/ps-http-sim:latest
    container_name: dub_ps_proxy
    restart: unless-stopped
    command:
      [
        "-listen-port=3900",
        "-mysql-dbname=dub",
        "-mysql-addr=db",
      ]
    depends_on:
      - db
    networks:
      - jannik-cloud-net

  redis:
    image: redis:alpine
    container_name: dub_redis
    restart: unless-stopped
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/dub/redis:/data
    networks:
      - jannik-cloud-net

  redis-proxy:
    image: hiett/serverless-redis-http:latest
    container_name: dub_redis_proxy
    restart: unless-stopped
    environment:
      SRH_MODE: env
      SRH_TOKEN: dummy_token
      SRH_CONNECTION_STRING: redis://redis:6379
    depends_on:
      - redis
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
