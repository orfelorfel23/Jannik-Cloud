services:
  netbird-server:
    image: netbirdio/management:0.28.1
    container_name: netbird-server
    restart: unless-stopped
    environment:
      - NETBIRD_DOMAIN=${NETBIRD_DOMAIN}
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/netbird/management.json:/etc/netbird/management.json:ro
      - /mnt/Jannik-Cloud-Volume-01/netbird:/var/lib/netbird
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - jannik-cloud-net

  netbird-dashboard:
    image: netbirdio/dashboard:0.28.1
    container_name: netbird-dashboard
    restart: unless-stopped
    environment:
      # Use full domain to avoid interpolation issues in JS
      - NETBIRD_MGMT_API_ENDPOINT=https://vpn.orfel.de
      - NETBIRD_MGMT_GRPC_API_ENDPOINT=https://vpn.orfel.de:443
      
      # Point to the management server as the Identity Provider (Embedded IdP)
      - AUTH_AUTHORITY=https://vpn.orfel.de
      - AUTH_CLIENT_ID=netbird-dashboard
      - AUTH_AUDIENCE=netbird-dashboard
      - AUTH_SUPPORTED_SCOPES=openid profile email
      
      # Legacy/Alternative names to ensure script replacement works
      - NETBIRD_AUTH_AUTHORITY=https://vpn.orfel.de
      - NETBIRD_AUTH_CLIENT_ID=netbird-dashboard
      - NETBIRD_AUTH_AUDIENCE=netbird-dashboard
      - NETBIRD_AUTH_DEVICE_AUTH_CLIENT_ID=netbird-dashboard
      - NETBIRD_AUTH_SUPPORTED_SCOPES=openid profile email

      - NETBIRD_DASHBOARD_URL=https://vpn.orfel.de
      - NETBIRD_GOOGLE_TAG_MANAGER_ID=GTM-000000

    networks:
      - jannik-cloud-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

networks:
  jannik-cloud-net:
    external: true

