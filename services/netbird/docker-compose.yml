services:
  # UI dashboard
  netbird-dashboard:
    image: netbirdio/dashboard:latest
    container_name: netbird-dashboard
    restart: unless-stopped
    environment:
      # Endpoints
      - NETBIRD_MGMT_API_ENDPOINT=https://vpn.orfel.de
      - NETBIRD_MGMT_GRPC_API_ENDPOINT=https://vpn.orfel.de:443
      # OIDC
      - AUTH_AUDIENCE=netbird-dashboard
      - AUTH_CLIENT_ID=netbird-dashboard
      - AUTH_AUTHORITY=https://vpn.orfel.de/
      - "USE_AUTH0=false"
      - AUTH_SUPPORTED_SCOPES=openid profile email
      - AUTH_REDIRECT_URI=https://vpn.orfel.de/
      - AUTH_SILENT_REDIRECT_URI=https://vpn.orfel.de/silent-callback
      - NETBIRD_TOKEN_SOURCE=accessToken
      
      # Legacy Alternative names
      - NETBIRD_AUTH_AUTHORITY=https://vpn.orfel.de/
      - NETBIRD_AUTH_CLIENT_ID=netbird-dashboard
      - NETBIRD_AUTH_AUDIENCE=netbird-dashboard
      - NETBIRD_AUTH_DEVICE_AUTH_CLIENT_ID=netbird-dashboard
      - NETBIRD_AUTH_SUPPORTED_SCOPES=openid profile email
    networks:
      - jannik-cloud-net

  # Management
  netbird-management:
    image: netbirdio/management:latest
    container_name: netbird-management
    restart: unless-stopped
    depends_on:
      - netbird-dashboard
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/netbird/management.json:/etc/netbird/management.json
      - /mnt/Jannik-Cloud-Volume-01/netbird/management:/var/lib/netbird
    environment:
      - NETBIRD_STORE_ENGINE_POSTGRES_DSN=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
    networks:
      - jannik-cloud-net

  # Signal
  netbird-signal:
    image: netbirdio/signal:latest
    container_name: netbird-signal
    restart: unless-stopped
    depends_on:
      - netbird-dashboard
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/netbird/signal:/var/lib/netbird
    command: [
      "--log-file", "console",
      "--port", "80"
    ]
    networks:
      - jannik-cloud-net

  # Relay
  netbird-relay:
    image: netbirdio/relay:latest
    container_name: netbird-relay
    restart: unless-stopped
    environment:
      - NB_LOG_LEVEL=info
      - NB_LISTEN_ADDRESS=:33080
      - NB_EXPOSED_ADDRESS=https://vpn.orfel.de:33080
      - NB_AUTH_SECRET=${NETBIRD_RELAY_AUTH_SECRET}
    ports:
      - 33080:33080/tcp
    networks:
      - jannik-cloud-net

  # CoTURN
  netbird-coturn:
    image: coturn/coturn:latest
    container_name: netbird-coturn
    restart: unless-stopped
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/netbird/turnserver.conf:/etc/turnserver.conf:ro
    ports:
      - 3478:3478/tcp
      - 3478:3478/udp
    command:
      - -c
      - /etc/turnserver.conf
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
