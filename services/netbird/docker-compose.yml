services:
  # Dashboard UI
  netbird-dashboard:
    image: netbirdio/dashboard:latest
    container_name: netbird-dashboard
    restart: unless-stopped
    environment:
      # Endpoints
      - NETBIRD_MGMT_API_ENDPOINT=https://vpn.orfel.de
      - NETBIRD_MGMT_GRPC_API_ENDPOINT=https://vpn.orfel.de
      # OIDC - Embedded IdP serves at /oauth2/
      - AUTH_AUDIENCE=netbird-dashboard
      - AUTH_CLIENT_ID=netbird-dashboard
      - AUTH_AUTHORITY=https://vpn.orfel.de/oauth2
      - "USE_AUTH0=false"
      - AUTH_SUPPORTED_SCOPES=openid profile email groups
      - AUTH_REDIRECT_URI=/nb-auth
      - AUTH_SILENT_REDIRECT_URI=/nb-silent-auth
    networks:
      - jannik-cloud-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  # Combined server (management + signal + relay + STUN)
  netbird-server:
    image: netbirdio/netbird-server:latest
    container_name: netbird-server
    restart: unless-stopped
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/netbird/data:/var/lib/netbird
      - /mnt/Jannik-Cloud-Volume-01/netbird/config.yaml:/etc/netbird/config.yaml
    command: [ "--config", "/etc/netbird/config.yaml" ]
    ports:
      - 3478:3478/udp
    environment:
      - NETBIRD_STORE_ENGINE_POSTGRES_DSN=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      - FORCE_RESTART=4
    networks:
      - jannik-cloud-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
networks:
  jannik-cloud-net:
    external: true
