services:
  netbird-server:
    image: netbirdio/management:${NETBIRD_VERSION:-latest}
    container_name: netbird-server
    restart: unless-stopped
    environment:
      - NETBIRD_DOMAIN=${NETBIRD_DOMAIN}
      # The management server uses the management.json for most config.
      # We mount it in the volume.
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/netbird/management.json:/etc/netbird/management.json
      - /mnt/Jannik-Cloud-Volume-01/netbird:/var/lib/netbird
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - jannik-cloud-net

  netbird-dashboard:
    image: netbirdio/dashboard:latest
    container_name: netbird-dashboard
    restart: unless-stopped
    environment:
      # NETBIRD_MGMT_API_ENDPOINT is used by the frontend to talk to the backend.
      # We set both variants to ensure the internal envsubst handles it.
      - NETBIRD_MGMT_API_ENDPOINT=https://vpn.orfel.de
      - MGMT_API_ENDPOINT=https://vpn.orfel.de
      
      - NETBIRD_MGMT_GRPC_API_ENDPOINT=https://vpn.orfel.de:443
      - MGMT_GRPC_API_ENDPOINT=https://vpn.orfel.de:443
      
      # Mandatory variables for the dashboard image to start.
      # These are also used for injection into the JS files.
      - AUTH_AUTHORITY=https://vpn.orfel.de
      - AUTH_CLIENT_ID=netbird-dashboard
      - AUTH_AUDIENCE=netbird-dashboard
      
      - NETBIRD_AUTH_AUTHORITY=https://vpn.orfel.de
      - NETBIRD_AUTH_CLIENT_ID=netbird-dashboard
      - NETBIRD_AUTH_AUDIENCE=netbird-dashboard
      - NETBIRD_AUTH_DEVICE_AUTH_CLIENT_ID=netbird-dashboard
      
      # Placeholders for other possible variables to prevent script errors
      - NETBIRD_GOOGLE_TAG_MANAGER_ID=GTM-000000
      - NETBIRD_DASHBOARD_URL=https://vpn.orfel.de

    networks:
      - jannik-cloud-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

networks:
  jannik-cloud-net:
    external: true
