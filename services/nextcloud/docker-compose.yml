services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: always
    networks:
      - jannik-cloud-net
    expose:
      - "11004"
    environment:
      NEXTCLOUD_ADMIN_USER: "${USERNAME}"
      NEXTCLOUD_ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      NEXTCLOUD_TRUSTED_DOMAINS: nextcloud.orfel.de
      POSTGRES_HOST: nextcloud-postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: nextcloud-redis
      REDIS_HOST_PORT: 6379
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/nextcloud:/var/www/html
    depends_on:
      - nextcloud-postgres
      - nextcloud-redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/status.php"]
      interval: 30s
      timeout: 10s
      retries: 3

  nextcloud-postgres:
    image: postgres:15-alpine
    container_name: nextcloud-postgres
    restart: always
    networks:
      - jannik-cloud-net
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/nextcloud/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: always
    networks:
      - jannik-cloud-net
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/nextcloud/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  jannik-cloud-net:
    external: true
