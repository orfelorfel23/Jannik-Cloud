services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:latest
    container_name: homeassistant
    restart: unless-stopped
    privileged: true
    ports:
      - "127.0.0.1:4663:8123"
    environment:
      TZ: Europe/Berlin
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/homeassistant:/config
      - /run/dbus:/run/dbus:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
