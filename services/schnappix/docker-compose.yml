services:
  schnappix_web:
    image: php:8-apache
    container_name: schnappix_web
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/schnappix/app:/var/www/html
      - /mnt/Jannik-Cloud-Volume-01/schnappix/uploads:/var/www/html/uploads
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
