services:
  schnappix_web:
    image: nginx:alpine
    container_name: schnappix_web
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/schnappix/app:/usr/share/nginx/html:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
