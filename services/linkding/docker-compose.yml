services:
  linkding:
    image: sissbruecker/linkding:latest
    container_name: linkding
    restart: unless-stopped
    ports:
      - "127.0.0.1:5465:9090"
    environment:
      LD_DB_ENGINE: postgres
      LD_DB_HOST: postgres
      LD_DB_PORT: 5432
      LD_DB_DATABASE: ${DB_NAME}
      LD_DB_USER: ${DB_USER}
      LD_DB_PASSWORD: ${DB_PASSWORD}
      LD_SUPERUSER_NAME: ${LINKDING_SUPERUSER_NAME}
      LD_SUPERUSER_PASSWORD: ${LINKDING_SUPERUSER_PASSWORD}
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/linkding:/etc/linkding/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
