services:
  nein:
    image: node:20-alpine
    container_name: nein
    restart: unless-stopped
    command: node /app/server.js
    volumes:
      - ./server.js:/app/server.js:ro
      - ./excuses.json:/app/excuses.json:ro
    working_dir: /app
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
