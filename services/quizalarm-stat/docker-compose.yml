services:
  quizalarm-stat:
    build: /mnt/Jannik-Cloud-Volume-01/quizalarm-stat/app
    container_name: quizalarm-stat
    restart: unless-stopped
    env_file: .env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:7850', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
