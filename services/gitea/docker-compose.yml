services:
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    ports:
      - "127.0.0.1:448:3000"
      - "127.0.0.1:2222:22"
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: ${DB_NAME}
      GITEA__database__USER: ${DB_USER}
      GITEA__database__PASSWD: ${DB_PASSWORD}
      GITEA__server__ROOT_URL: https://git.orfel.de/
      GITEA__server__DOMAIN: git.orfel.de
      GITEA__server__SSH_DOMAIN: git.orfel.de
      GITEA__server__SSH_PORT: 2222
      GITEA__server__HTTP_PORT: 3000
      GITEA__security__SECRET_KEY: ${SECRET_KEY}
      GITEA__security__INTERNAL_TOKEN: ${INTERNAL_TOKEN}
      GITEA__mailer__ENABLED: "false"
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/gitea:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
