services:
  stirlingpdf:
    image: frooodle/s-pdf:latest
    container_name: stirlingpdf
    restart: unless-stopped
    ports:
      - "127.0.0.1:733:8080"
    environment:
      DOCKER_ENABLE_SECURITY: "false"
      INSTALL_BOOK_AND_ADVANCED_HTML_OPS: "false"
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/stirlingpdf/data:/usr/share/tessdata
      - /mnt/Jannik-Cloud-Volume-01/stirlingpdf/config:/configs
      - /mnt/Jannik-Cloud-Volume-01/stirlingpdf/logs:/logs
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
