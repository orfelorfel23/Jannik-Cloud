services:
  jga:
    image: nginx:alpine
    container_name: jga
    restart: unless-stopped
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/jga/content:/usr/share/nginx/html:ro
      - /mnt/Jannik-Cloud-Volume-01/jga/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
