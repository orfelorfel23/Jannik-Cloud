version: 1.1.5

endpoints:
  custom:
    - name: "LiteLLM"
      apiKey: "${LITELLM_API_KEY}"
      baseURL: "http://litellm:4000/v1"
      models:
        default:
          - "gemini-2.5-pro-preview"
          - "gemini-2.5-flash-preview"
          - "gemini-2.0-flash"
          - "gemini-2.0-flash-lite"
          - "gemini-1.5-flash"
          - "gemini-1.5-flash-8b"
          - "minimax-m2.7"
          - "poe-gpt-4o"
          - "poe-claude-sonnet"
          - "poe-gemini-2-flash"
        fetch: true
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "LiteLLM"
