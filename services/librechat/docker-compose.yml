services:
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: unless-stopped
    ports:
      - "127.0.0.1:2428:3080"
    depends_on:
      librechat-mongo:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3080
      MONGO_URI: mongodb://librechat-mongo:27017/librechat
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URI: redis://redis:6379
      DOMAIN_SERVER: https://chat.orfel.de
      DOMAIN_CLIENT: https://chat.orfel.de
      CREDS_KEY: ${SECRET_KEY}
      CREDS_IV: ${CREDS_IV}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      LIBRECHAT_CONFIG_PATH: /app/librechat.yaml
      ALLOW_REGISTRATION: "true"
      ALLOW_EMAIL_LOGIN: "true"
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/librechat/images:/app/client/public/images
      - /mnt/Jannik-Cloud-Volume-01/librechat/logs:/app/api/logs
      - /opt/Jannik-Cloud/services/librechat/librechat.yaml:/app/librechat.yaml:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    networks:
      - jannik-cloud-net

  librechat-mongo:
    image: mongo:7
    container_name: librechat-mongo
    restart: unless-stopped
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/librechat/mongodb:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - jannik-cloud-net

networks:
  jannik-cloud-net:
    external: true
