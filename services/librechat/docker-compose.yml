services:
  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    container_name: librechat
    restart: always
    networks:
      - jannik-cloud-net
    expose:
      - "11008"
    environment:
      MONGO_URI: "mongodb://librechat-mongo:27017/librechat"
      JWT_SECRET: "${JWT_SECRET}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY}"
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/librechat:/app/client/public/images
    depends_on:
      - librechat-mongo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3080"]
      interval: 30s
      timeout: 10s
      retries: 3

  librechat-mongo:
    image: mongo:7-alpine
    container_name: librechat-mongo
    restart: always
    networks:
      - jannik-cloud-net
    volumes:
      - /mnt/Jannik-Cloud-Volume-01/librechat/mongo:/data/db

networks:
  jannik-cloud-net:
    external: true
